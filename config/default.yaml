# bounty-agent configuration
#
# This file is loaded by pydantic-settings. Every section is optional except
# `scope.allowlist`, which must list at least one host. Use ["*"] to allow
# any host (still applies path_denylist and scheme validation).
#
# Override individual fields via env vars: BOUNTY_AGENT_<SECTION>__<FIELD>.
# Example: BOUNTY_AGENT_AGENT__MAX_REQUESTS_PER_MINUTE=500

scope:
  allowlist: []          # required. ["*"] = any host. Empty = refuse all.
  path_denylist: []      # optional; URLs whose path starts with any prefix here are skipped

agent:
  min_delay_seconds: 0.1
  max_delay_seconds: 0.5
  max_requests_per_minute: 200
  request_timeout_seconds: 10
  user_agents_rotate: true

nuclei:
  enabled: true
  binary: "nuclei"
  templates_path: "~/nuclei-templates"
  severity:
    - critical
    - high
    - medium
  concurrency: 1
  rate_limit: 10
  timeout_seconds: 600

fuzzing:
  enabled: true
  max_endpoints: 100
  payloads_per_param: 5
  categories:
    - sql_injection
    - xss
    - path_traversal
  # payloads_file: config/payloads-aggressive.yaml   # uncomment to load destructive payloads

waf:
  detect: true

reporting:
  output_dir: "reports"
  formats:
    - text
    - markdown
    - json

persistence:
  enabled: true
  sqlite_path: "bounty.sqlite"

logging:
  level: INFO
  audit_log_path: null     # set to a path (e.g. "logs/audit.log") to enable JSONL audit trail

notifications:
  enabled: false
  webhook_url: ""

tools:
  subfinder: true
  waybackurls: true
  httpx: true
  dnsx: true
  katana: true
  naabu: true

tools_cache:
  enabled: true
  ttl_seconds: 21600

llm:
  enabled: false
  model: claude-haiku-4-5
  max_tokens: 1024
  response_excerpt_chars: 2000
